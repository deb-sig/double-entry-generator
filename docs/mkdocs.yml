# Extra configuration (i18n alternate links used by mkdocs-static-i18n)
extra:
  alternate:
    - name: "🇨🇳 中文"
      link: ./
      lang: zh
    - name: "🇺🇸 English"
      link: ./en/
      lang: en

# Extra CSS/JS：与 config 同级的 css/、js/ 会被复制到 site 同路径，避免 i18n 构建时 assets 未复制导致 404
extra_css:
  - css/custom.css
extra_javascript:
  - js/code-copy.js

schema: https://deg.dev/template-profile/v2
id: bocom_debit
name: BOCOM Debit
template:
    fileFormat: csv
    delimiter: ','
    sourceHeaders:
        - 序号
        - 交易日期
        - 交易时间
        - 交易类型
        - 借贷
        - 交易金额
        - 余额
        - 对方账号
        - 对方户名
        - 交易地点
        - 摘要
    defaultCurrency: CNY

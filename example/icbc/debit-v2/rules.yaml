options:
    title: 测试
    operatingCurrency: CNY

templateRules:
    - id: 工行借记卡V2基础交易
      actions:
          date: <交易日期>
          payee: <交易场所>
          currency: CNY
          metadata:
              cardName: 这是卡别名
              source: 中国工商银行
              txType: <摘要>
              currency: <记账币种>
              peerAccount: <对方户名>
              peerAccountNum: <对方账户>

    - id: 工行借记卡V2对手方
      when: <交易场所> == ""
      actions:
          payee: <对方户名>

    - id: 工行借记卡V2组合对手方
      when: <交易场所> != "" && <对方户名> != ""
      actions:
          payee: <交易场所> <对方户名>

    - id: 工行借记卡V2收入
      when: <记账金额(收入)> != "" && <记账金额(收入)> != "-"
      actions:
          amount: <记账金额(收入)>.number
          type: 收入
          metadata:
              type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Assets:Bank:CN:ICBC

    - id: 工行借记卡V2支出
      when: <记账金额(支出)> != "" && <记账金额(支出)> != "-"
      actions:
          amount: <记账金额(支出)>.number
          type: 支出
          metadata:
              type: 支出
          from:
              account: Assets:Bank:CN:ICBC
          to:
              account: Expenses:FIXME

personalRules:
    - id: 忽略财付通支付宝
      when: <交易场所> ~ "财付通-" || <交易场所> ~ "支付宝-"
      actions:
          ignore: true

    - id: 忽略蚂蚁基金赎回
      when: <交易场所> ~ "支付宝" && <摘要> ~ "蚂蚁基金赎回到银行"
      actions:
          ignore: true

    - id: 信用卡合伙人收入
      when: <对方户名> ~ "总行信用卡合伙人" && <记账金额(收入)> != "" && <记账金额(收入)> != "-"
      actions:
          from:
              account: Income:Bank:ICBC:CreditCard

    - id: 掌上生活还款支出
      when: <对方户名> ~ "掌上生活还款" && <记账金额(支出)> != "" && <记账金额(支出)> != "-"
      actions:
          to:
              account: Liabilities:Bank:CMB:CreditCard

    - id: 忽略自动还款
      when: <交易场所> ~ "广东XX分行银行卡中心" && <摘要> ~ "自动还款"
      actions:
          ignore: true

    - id: 借款人收入
      when: (<对方户名> ~ "张三" || <对方户名> ~ "李四" || <对方户名> ~ "王五") && <记账金额(收入)> != "" && <记账金额(收入)> != "-"
      actions:
          from:
              account: Assets:Borrow

    - id: 借款人支出
      when: (<对方户名> ~ "张三" || <对方户名> ~ "李四" || <对方户名> ~ "王五") && <记账金额(支出)> != "" && <记账金额(支出)> != "-"
      actions:
          to:
              account: Assets:Borrow

schema: https://deg.dev/template-profile/v1
id: icbc-debit-v2
name: icbc-debit-v2
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 3
    skipInvalidRows: true
    sourceHeaders:
        - 交易日期
        - 摘要
        - 交易详情
        - 交易场所
        - 交易国家或地区简称
        - 钞/汇
        - 交易金额(收入)
        - 交易金额(支出)
        - 交易币种
        - 记账金额(收入)
        - 记账金额(支出)
        - 记账币种
        - 余额
        - 对方户名
        - 对方账户
    columns:
        date: 交易日期
        amountIn: 记账金额(收入)
        amountOut: 记账金额(支出)
        payee: 对方户名
        narration: 摘要
        currency: 记账币种
    metadata:
        txType: 摘要
    defaultMinusAccount: Assets:FIXME
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

schema: https://deg.dev/template-profile/v2
id: icbc-debit-v2
name: ICBC Debit V2
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 3
    skipInvalidRows: true
    sourceHeaders:
        - 交易日期
        - 摘要
        - 交易详情
        - 交易场所
        - 交易国家或地区简称
        - 钞/汇
        - 交易金额(收入)
        - 交易金额(支出)
        - 交易币种
        - 记账金额(收入)
        - 记账金额(支出)
        - 记账币种
        - 余额
        - 对方户名
        - 对方账户
    defaultCurrency: CNY

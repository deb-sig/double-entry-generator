options:
    title: 测试
    operatingCurrency: CNY

templateRules:
    - id: 工行信用卡基础交易
      actions:
          date: <交易日期>
          payee: <交易场所>
          currency: CNY
          metadata:
              source: 中国工商银行
              txType: <摘要>
              currency: <记账币种>
              balances: <余额>.number

    - id: 工行信用卡收入
      when: <记账金额(收入)> != "" && <记账金额(收入)> != "-"
      actions:
          amount: <记账金额(收入)>.number
          type: 收入
          metadata:
              type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Liabilities:Bank:CN:ICBC

    - id: 工行信用卡支出
      when: <记账金额(支出)> != "" && <记账金额(支出)> != "-"
      actions:
          amount: <记账金额(支出)>.number
          type: 支出
          metadata:
              type: 支出
          from:
              account: Liabilities:Bank:CN:ICBC
          to:
              account: Expenses:FIXME

personalRules:
    - id: 忽略财付通支付宝
      when: <交易场所> ~ "财付通" || <交易场所> ~ "支付宝"
      actions:
          ignore: true

    - id: 高速支出
      when: <交易场所> ~ "广东联合电子收费股份" && <记账金额(支出)> != "" && <记账金额(支出)> != "-"
      actions:
          to:
              account: Expenses:Transport:Highway

    - id: 高速收入
      when: <交易场所> ~ "广东联合电子收费股份" && <记账金额(收入)> != "" && <记账金额(收入)> != "-"
      actions:
          from:
              account: Expenses:Transport:Highway

    - id: 自动转账还款
      when: <摘要> ~ "人民币自动转帐还款"
      actions:
          from:
              account: Assets:Bank:CN:ICBC:Savings

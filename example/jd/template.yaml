schema: https://deg.dev/template-profile/v2
id: jd
name: JD
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 19
    sourceHeaders:
        - 交易时间
        - 商户名称
        - 交易说明
        - 金额
        - 收/付款方式
        - 交易状态
        - 收/支
        - 交易分类
        - 交易订单号
        - 商家订单号
        - 备注
    defaultCurrency: CNY

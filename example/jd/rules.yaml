options:
    title: jd
    operatingCurrency: CNY

templateRules:
    - id: 京东基础交易
      actions:
          date: <交易时间>
          amount: <金额>.number
          payee: <商户名称>
          narration: <交易说明>
          currency: CNY
          type: <收/支>
          metadata:
              source: <商户名称>
              category: <交易分类>
              payTime: <交易时间> +0800 CST
              orderId: <交易订单号>
              merchantId: <商家订单号>
              type: <收/支>
              method: <收/付款方式>
              status: <交易状态>

    - id: 平台商户京鲜生
      when: <商户名称> == "京东平台商户" && <交易说明> ~ "京鲜生" && <交易说明> !~ "退款-"
      actions:
          payee: 京鲜生
          metadata:
              source: 京鲜生

    - id: 平台商户JEEP
      when: <商户名称> == "京东平台商户" && <交易说明> ~ "JEEP" && <交易说明> !~ "退款-"
      actions:
          payee: JEEP
          metadata:
              source: JEEP

    - id: 京东支出
      when: <收/支> == "支出"
      actions:
          from:
              account: Assets:FIXME
          to:
              account: Expenses:FIXME

    - id: 京东收入
      when: <收/支> == "收入"
      actions:
          from:
              account: Assets:FIXME
          to:
              account: Expenses:FIXME

    - id: 京东不计收支普通支出
      when: <收/支> == "不计收支" && <交易说明> !~ "退款-" && <交易说明> !~ "冻结-" && <交易说明> !~ "解冻-"
      actions:
          from:
              account: Assets:FIXME
          to:
              account: Expenses:FIXME

    - id: 京东退款
      when: <收/支> == "不计收支" && <交易说明> ~ "退款-"
      actions:
          from:
              account: Income:Rebate
          to:
              account: Expenses:FIXME

    - id: 京东冻结解冻忽略
      when: <收/支> == "不计收支" && (<交易说明> ~ "冻结-" || <交易说明> ~ "解冻-")
      actions:
          ignore: true

personalRules:
    - id: 零食支出
      when: (<交易说明> ~ "椰子" || <交易说明> ~ "红薯" || <交易说明> ~ "膳" || <交易说明> ~ "食用油" || <交易说明> ~ "挂面" || <交易说明> ~ "食盐") && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Food:Snacks

    - id: 零食收入
      when: (<交易说明> ~ "椰子" || <交易说明> ~ "红薯" || <交易说明> ~ "膳" || <交易说明> ~ "食用油" || <交易说明> ~ "挂面" || <交易说明> ~ "食盐") && <收/支> == "收入"
      actions:
          from:
              account: Expenses:Food:Snacks

    - id: 美妆个护支出
      when: <交易分类> ~ "美妆个护" && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:MakeUp

    - id: 食品酒饮支出
      when: <交易分类> == "食品酒饮" && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Food:Snacks

    - id: 医疗保健支出
      when: <交易分类> ~ "医疗保健" && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Hospital:Medicine

    - id: 电子产品支出
      when: (<交易分类> ~ "数码电器" || <交易分类> ~ "电脑办公" || <交易分类> ~ "手机通讯") && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Electronics

    - id: 日用百货支出
      when: (<交易分类> ~ "日用百货" || <交易分类> ~ "清洁纸品" || <交易分类> ~ "生活服务" || <交易分类> ~ "家居家装" || <交易分类> ~ "其他网购" || <交易分类> ~ "1号店") && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Groceries

    - id: 运动户外支出
      when: <交易分类> ~ "运动户外" && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Sports

    - id: 服饰支出
      when: (<交易分类> ~ "鞋服箱包" || <交易分类> ~ "服饰内衣") && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Clothes

    - id: 快递支出
      when: <交易分类> ~ "收发快递" && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Reside:Express

    - id: 转入收入
      when: <交易说明> ~ "转入" && <收/支> == "收入"
      actions:
          from:
              account: Income:Rebate

    - id: 亲密卡支出
      when: <商户名称> ~ "亲密卡" && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Expenses:Prpaid

    - id: 白条支出
      when: (<交易说明> ~ "白条" || <交易说明> ~ "还款") && <收/支> != "收入" && <交易说明> !~ "退款-"
      actions:
          to:
              account: Liabilities:Baitiao

    - id: 京东小金库收益
      when: <交易说明> == "京东小金库收益"
      actions:
          from:
              account: Assets:EPay:JD
          to:
              account: Income:PnL:JD

    - id: 京东白条支出
      when: <收/付款方式> ~ "京东白条" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:JD:Baitiao

    - id: 京东白条退款
      when: <收/付款方式> ~ "京东白条" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:JD:Baitiao

    - id: 小金库支出
      when: <收/付款方式> ~ "小金库零用钱" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Assets:EPay:JD

    - id: 小金库退款
      when: <收/付款方式> ~ "小金库零用钱" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Assets:EPay:JD

    - id: 钱包余额支出
      when: <收/付款方式> ~ "钱包余额" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Assets:JD:Balance

    - id: 钱包余额退款
      when: <收/付款方式> ~ "钱包余额" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Assets:JD:Balance

    - id: 交通0354支出
      when: <收/付款方式> ~ "(0354)" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:CC:BCM:0354

    - id: 交通0354退款
      when: <收/付款方式> ~ "(0354)" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:CC:BCM:0354

    - id: 中行1341支出
      when: <收/付款方式> ~ "(1341)" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:CC:BoC:1341

    - id: 中行1341退款
      when: <收/付款方式> ~ "(1341)" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:CC:BoC:1341

    - id: 中行1875支出
      when: <收/付款方式> ~ "(1875)" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:CC:BoC:1875

    - id: 中行1875退款
      when: <收/付款方式> ~ "(1875)" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:CC:BoC:1875

    - id: 北银2189支出
      when: <收/付款方式> ~ "(2189)" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:CC:BoNB:2189

    - id: 北银2189退款
      when: <收/付款方式> ~ "(2189)" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:CC:BoNB:2189

    - id: 招行0924支出
      when: <收/付款方式> ~ "(0924)" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:CC:CMB:0924

    - id: 招行0924退款
      when: <收/付款方式> ~ "(0924)" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:CC:CMB:0924

    - id: 民生0073支出
      when: <收/付款方式> ~ "(0073)" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:CC:CMBC:0073

    - id: 民生0073退款
      when: <收/付款方式> ~ "(0073)" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:CC:CMBC:0073

    - id: 民生5559支出
      when: <收/付款方式> ~ "(5559)" && <交易说明> !~ "退款-"
      actions:
          from:
              account: Liabilities:CC:CMBC:5559

    - id: 民生5559退款
      when: <收/付款方式> ~ "(5559)" && <交易说明> ~ "退款-"
      actions:
          to:
              account: Liabilities:CC:CMBC:5559

    - id: 忽略微信
      when: <收/付款方式> ~ "微信-"
      actions:
          ignore: true

    - id: 忽略先享后付
      when: <收/付款方式> ~ "先享后付"
      actions:
          ignore: true

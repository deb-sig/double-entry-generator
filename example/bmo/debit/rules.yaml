options:
    title: 测试
    operatingCurrency: CAD

templateRules:
    - id: BMO借记卡基础交易
      actions:
          date: <Date Posted>
          payee: BMO
          narration: <Description>
          currency: CAD

    - id: BMO借记卡支出
      when: <Transaction Type> == DEBIT
      actions:
          amount: <Transaction Amount>.number
          type: 支出
          from:
              account: Assets:DebitCard:BMOChequing
          to:
              account: Expenses:FIXME

    - id: BMO借记卡收入
      when: <Transaction Type> == CREDIT
      actions:
          amount: <Transaction Amount>.number
          type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Assets:DebitCard:BMOChequing

personalRules:
    - id: 大统华
      when: <Description> ~ "T T"
      actions:
          tags:
              - tt_tag
          to:
              account: Expenses:Grocery

    - id: Dollarama
      when: <Description> ~ "DOLLARAMA"
      actions:
          tags:
              - grocery_tag1
              - cheap_tag2
          to:
              account: Expenses:Grocery

    - id: 工资
      when: <Description> ~ "DEVELOPM MSP" && <Transaction Type> == CREDIT
      actions:
          from:
              account: Income:Salary

    - id: 收入转账
      when: <Description> ~ "SEND E-TFR" && <Transaction Type> == CREDIT
      actions:
          from:
              account: Income:FIXME

options:
    title: 测试
    operatingCurrency: CAD

templateRules:
    - id: BMO信用卡基础交易
      actions:
          date: <Transaction Date>
          payee: BMO
          narration: <Description>
          amount: <Transaction Amount>.number
          currency: CAD

    - id: BMO信用卡支出
      when: <Transaction Amount> >= 0
      actions:
          type: 支出
          from:
              account: Liabilities:CreditCard:BMO
          to:
              account: Expenses:FIXME

    - id: BMO信用卡收入
      when: <Transaction Amount> < 0
      actions:
          type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Liabilities:CreditCard:BMO

personalRules:
    - id: 大统华
      when: <Description> ~ "T T"
      actions:
          tags:
              - tt_tag
          to:
              account: Expenses:Grocery

    - id: Costco
      when: <Description> ~ "COSTCO"
      actions:
          to:
              account: Expenses:Grocery

    - id: T&T超市
      when: <Description> ~ "T&T SUPERMARKET"
      actions:
          to:
              account: Expenses:Grocery

    - id: Jollibee
      when: <Description> ~ "JOLLIBEE"
      actions:
          to:
              account: Expenses:Food:Lunch

    - id: Dollarama
      when: <Description> ~ "DOLLARAMA"
      actions:
          tags:
              - grocery_tag1
              - cheap_tag2
          to:
              account: Expenses:Grocery

    - id: 工资
      when: <Description> ~ "DEVELOPM MSP" && <Transaction Amount> < 0
      actions:
          from:
              account: Income:Salary

    - id: 收入转账
      when: <Description> ~ "SEND E-TFR" && <Transaction Amount> < 0
      actions:
          from:
              account: Income:FIXME

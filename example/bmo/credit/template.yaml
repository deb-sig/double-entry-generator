schema: https://deg.dev/template-profile/v2
id: bmo-credit
name: BMO Credit
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 1
    sourceHeaders:
        - 'Item #'
        - 'Card #'
        - Transaction Date
        - Posting Date
        - Transaction Amount
        - Description
    defaultCurrency: CAD

options:
    title: 测试
    operatingCurrency: CNY

templateRules:
    - id: 火币交易基础
      actions:
          date: <时间>
          payee: Huobi-<交易类型>
          narration: <方向>-<交易对>
          vars:
              cash: Assets:Huobi:Cash
              position: Assets:Huobi:Positions
              feeExpense: Expenses:Huobi:Commission
              pnl: Income:Huobi:PnL
              base: <交易对>.extract("/(.+)$")
              target: <交易对>.extract("^([^/]+)")
              fee: <手续费>.extract("^([.0-9]+)")
              feeUnit: <手续费>.extract("([A-Za-z][A-Za-z0-9]*)$")

    - id: 火币买入手续费同币种
      when: <方向> == "买入" && <手续费>.extract("([A-Za-z][A-Za-z0-9]*)$") == <交易对>.extract("^([^/]+)")
      actions:
          postings:
              - <var.cash> -<成交额>.format("%.8f") <var.base>
              - <var.position> <数量>.format("%.8f") <var.target> {<价格>.format("%.8f") <var.base>} @@ <成交额>.format("%.8f") <var.base>
              - <var.cash> -<var.fee>.format("%.8f") <var.target> @ <价格>.format("%.8f") <var.base>
              - <var.feeExpense> <var.fee>.format("%.8f") <var.feeUnit> @ <价格>.format("%.8f") <var.base>

    - id: 火币买入手续费异币种
      when: <方向> == "买入" && <手续费>.extract("([A-Za-z][A-Za-z0-9]*)$") != <交易对>.extract("^([^/]+)")
      actions:
          postings:
              - <var.cash> -<成交额>.format("%.8f") <var.base>
              - <var.position> <数量>.format("%.8f") <var.target> {<价格>.format("%.4f") <var.base>} @@ <成交额>.format("%.8f") <var.base>
              - <var.position> -<var.fee>.format("%.8f") <var.feeUnit>
              - <var.feeExpense> <var.fee>.format("%.8f") <var.feeUnit>

    - id: 火币卖出
      when: <方向> == "卖出"
      actions:
          postings:
              - <var.position> -<数量>.format("%.8f") <var.target> {} @ <价格>.format("%.8f") <var.base>
              - <var.cash> <成交额>.format("%.8f") <var.base>
              - <var.cash> -<var.fee>.format("%.8f") <var.feeUnit>
              - <var.feeExpense> <var.fee>.format("%.8f") <var.feeUnit>
              - <var.pnl>

personalRules:
    - id: Rule1 BTC 买入
      when: (<交易对> == "BTC/USDT" || <交易对> == "BTC1S/USDT") && <方向> == "买入" && <交易类型> == "币币交易"
      actions:
          vars:
              cash: Assets:Rule1:Cash
              position: Assets:Rule1:Positions
              feeExpense: Expenses:Rule1:Commission
              pnl: Income:Rule1:PnL

schema: https://deg.dev/template-profile/v2
id: hxsec
name: hxsec
template:
    fileFormat: xls
    encoding: gb18030
    delimiter: "\t"
    skipLeadingRows: 1
    skipInvalidRows: true
    sourceHeaders:
        - date
        - time
        - txType
        - securityCode
        - securityName
        - price
        - quantity
        - remainingQuantity
        - tradeAmount
        - totalFee
        - amount
        - balance
        - commission
        - stampTax
        - transferFee
        - settlementFee
        - regulatoryFee
        - handlingFee
        - securitiesFee
        - financialLevy
        - otherFee
        - currency
        - tradeId
        - shareholderCode
        - accountNumber
    defaultCurrency: CNY

schema: https://deg.dev/template-profile/v1
id: hxsec
name: hxsec
template:
    fileFormat: xls
    encoding: gb18030
    delimiter: "\t"
    skipLeadingRows: 1
    sourceHeaders:
        - date
        - time
        - txType
        - securityCode
        - securityName
        - price
        - quantity
        - remainingQuantity
        - tradeAmount
        - totalFee
        - amount
        - balance
        - commission
        - stampTax
        - transferFee
        - settlementFee
        - regulatoryFee
        - handlingFee
        - securitiesFee
        - financialLevy
        - otherFee
        - currency
        - tradeId
        - shareholderCode
        - accountNumber
    columns:
        date: date
        time: time
        amount: amount
        payee: securityName
        narration: txType
        type: txType
        currency: currency
    metadata:
        txType: txType
        securityCode: securityCode
        tradeId: tradeId
        accountNumber: accountNumber
    defaultMinusAccount: Assets:FIXME
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

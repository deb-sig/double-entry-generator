schema: https://deg.dev/template-profile/v2
id: citic-credit
name: CITIC Credit
template:
    fileFormat: xls
    delimiter: ','
    skipLeadingRows: 1
    sourceHeaders:
        - 交易日期
        - 入账日期
        - 交易描述
        - 卡末四位
        - 交易币种
        - 结算币种
        - 交易金额
        - 结算金额
    defaultCurrency: CNY

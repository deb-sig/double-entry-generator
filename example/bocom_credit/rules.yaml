options:
    title: bocom_credit
    operatingCurrency: CNY

templateRules:
    - id: 交通信用卡基础交易
      actions:
          date: <交易日期>
          amount: <入账币种/金额>.number
          currency: <入账币种/金额>.extract("^[A-Z]+")
          payee: BOCOM Credit
          narration: <交易说明>
          type: <交易说明>.extract("^[^ ]+")
          metadata:
              source: 交通银行信用卡
              recordDate: <记账日期>

    - id: 交通信用卡原始交易额
      when: <交易币种/金额> !~ "CNY"
      actions:
          metadata:
              transactionAmount: <交易币种/金额>

    - id: 交通信用卡收入
      when: <交易说明> ~ "退货" || <交易说明> ~ "信用卡还款" || <交易说明> ~ "红包还款" || <交易说明> ~ "刷卡金返还" || <交易说明> ~ "自动购汇还款"
      actions:
          type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Liabilities:BOCOM:CreditCard

    - id: 交通信用卡支出
      when: <交易说明> ~ "消费" || <交易说明> ~ "刷卡金扣回" || <交易说明> ~ "分期扣款" || <交易说明> ~ "自动购汇扣款"
      actions:
          type: 支出
          from:
              account: Liabilities:BOCOM:CreditCard
          to:
              account: Expenses:FIXME

personalRules:
    - id: 信用卡还款
      when: <交易说明> ~ "信用卡还款"
      actions:
          from:
              account: Equity:Transfers

    - id: 美团收入
      when: <交易说明> ~ "美团" && (<交易说明> ~ "退货" || <交易说明> ~ "信用卡还款" || <交易说明> ~ "红包还款" || <交易说明> ~ "刷卡金返还" || <交易说明> ~ "自动购汇还款")
      actions:
          from:
              account: Expenses:Food

    - id: 美团支出
      when: <交易说明> ~ "美团" && (<交易说明> ~ "消费" || <交易说明> ~ "刷卡金扣回" || <交易说明> ~ "分期扣款" || <交易说明> ~ "自动购汇扣款")
      actions:
          to:
              account: Expenses:Food

    - id: 饿了么收入
      when: <交易说明> ~ "饿了么" && (<交易说明> ~ "退货" || <交易说明> ~ "信用卡还款" || <交易说明> ~ "红包还款" || <交易说明> ~ "刷卡金返还" || <交易说明> ~ "自动购汇还款")
      actions:
          from:
              account: Expenses:Food

    - id: 饿了么支出
      when: <交易说明> ~ "饿了么" && (<交易说明> ~ "消费" || <交易说明> ~ "刷卡金扣回" || <交易说明> ~ "分期扣款" || <交易说明> ~ "自动购汇扣款")
      actions:
          to:
              account: Expenses:Food

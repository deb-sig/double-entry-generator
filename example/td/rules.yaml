options:
    title: 测试
    operatingCurrency: CAD

templateRules:
    - id: TD基础交易
      actions:
          date: <date>
          payee: TD
          narration: <narration>
          currency: CAD

    - id: TD支出
      when: <amountOut> != ""
      actions:
          amount: <amountOut>.number
          type: 支出
          from:
              account: Assets:DebitCard:TDChequing
          to:
              account: Expenses:FIXME

    - id: TD收入
      when: <amountIn> != ""
      actions:
          amount: <amountIn>.number
          type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Assets:DebitCard:TDChequing

personalRules:
    - id: 大统华
      when: <narration> ~ "T T"
      actions:
          tags:
              - tt_tag
          to:
              account: Expenses:Grocery

    - id: Dollarama
      when: <narration> ~ "DOLLARAMA"
      actions:
          tags:
              - grocery_tag1
              - cheap_tag2
          to:
              account: Expenses:Grocery

    - id: 工资
      when: <narration> ~ "DEVELOPM MSP" && <amountIn> != ""
      actions:
          from:
              account: Income:Salary

    - id: 收入转账
      when: <narration> ~ "SEND E-TFR" && <amountIn> != ""
      actions:
          from:
              account: Income:FIXME

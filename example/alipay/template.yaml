schema: https://deg.dev/template-profile/v2
id: alipay
name: 测试
template:
  fileFormat: csv
  encoding: gb18030
  delimiter: ','
  skipLeadingRows: 22
  sourceHeaders:
    - 交易时间
    - 交易分类
    - 交易对方
    - 对方账号
    - 商品说明
    - 收/支
    - 金额
    - 收/付款方式
    - 交易状态
    - 交易订单号
    - 商家订单号
    - 备注
    - ""
  defaultCurrency: CNY

personalRules:
    - id: rule-001
      when: (narration ~ "单人餐" || narration ~ "牛肉火锅" || narration ~ "江湖菜" || narration ~ "川菜" || narration ~ "肉蟹煲" || narration ~ "自助餐" || narration ~ "盖码饭" || narration ~ "米线" || narration ~ "斑鱼" || narration ~ "蛋挞" || narration ~ "湖南菜" || narration ~ "湘语" || narration ~ "一条鱼" || narration ~ "湘菜" || narration ~ "活鱼" || narration ~ "牛羊肉" || narration ~ "米粉")
      actions:
        to: Expenses:Food:Meal:Coupon
    - id: rule-002
      when: (narration ~ "单人餐" || narration ~ "牛肉火锅" || narration ~ "江湖菜" || narration ~ "川菜" || narration ~ "肉蟹煲" || narration ~ "自助餐" || narration ~ "盖码饭" || narration ~ "米线" || narration ~ "斑鱼" || narration ~ "蛋挞" || narration ~ "湖南菜" || narration ~ "湘语" || narration ~ "一条鱼" || narration ~ "湘菜" || narration ~ "活鱼" || narration ~ "牛羊肉" || narration ~ "米粉") && date.time >= "16:00" && date.time <= "21:00"
      actions:
        to: Expenses:Food:Meal:Dinner
    - id: rule-003
      when: (narration ~ "单人餐" || narration ~ "牛肉火锅" || narration ~ "江湖菜" || narration ~ "川菜" || narration ~ "肉蟹煲" || narration ~ "自助餐" || narration ~ "盖码饭" || narration ~ "米线" || narration ~ "斑鱼" || narration ~ "蛋挞" || narration ~ "湖南菜" || narration ~ "湘语" || narration ~ "一条鱼" || narration ~ "湘菜" || narration ~ "活鱼" || narration ~ "牛羊肉" || narration ~ "米粉") && date.time >= "10:30" && date.time <= "14:00"
      actions:
        to: Expenses:Food:Meal:Lunch
    - id: rule-004
      when: narration ~ "代金券"
      actions:
        to: Expenses:Food:Meal:Coupon
    - id: rule-005
      when: (narration ~ "瑞幸" || narration ~ "喜茶" || narration ~ "分甜" || narration ~ "奶茶" || narration ~ "果茶" || narration ~ "甜品" || narration ~ "中杯" || narration ~ "大杯")
      actions:
        to: Expenses:Food:Snacks
    - id: rule-006
      when: narration ~ "【美团月付】主动还款"
      actions:
        to: Liabilities:MT:zwyyy456
    - id: rule-007
      when: metadata.method ~ "(0354)"
      actions:
        from: Liabilities:CC:BCM:0354
    - id: rule-008
      when: metadata.method ~ "(1341)"
      actions:
        from: Liabilities:CC:BoC:1341
    - id: rule-009
      when: metadata.method ~ "(1875)"
      actions:
        from: Liabilities:CC:BoC:1875
    - id: rule-010
      when: metadata.method ~ "(2189)"
      actions:
        from: Liabilities:CC:BoNB:2189
    - id: rule-011
      when: metadata.method ~ "(0924)"
      actions:
        from: Liabilities:CC:CMB:0924
    - id: rule-012
      when: metadata.method ~ "(0073)"
      actions:
        from: Liabilities:CC:CMBC:0073
    - id: rule-013
      when: metadata.method ~ "(5559)"
      actions:
        from: Liabilities:CC:CMBC:5559
    - id: rule-014
      when: metadata.method ~ "(3147)"
      actions:
        from: Assets:DC:BoC:3147
    - id: rule-015
      when: metadata.method ~ "美团月付"
      actions:
        from: Liabilities:MT:zwyyy456
    - id: rule-016
      when: metadata.method ~ "美团余额"
      actions:
        from: Assets:MT:Balance:zwyyy456
    - id: rule-017
      when: metadata.method ~ "微信支付"
      actions:
        from: Assests:Test:Wx
        ignore: true
    - id: rule-018
      when: type ~ "不计收支" && metadata.category ~ "网购"
      actions:
        to: Income:Rebate
    - id: rule-019
      when: type ~ "收入"
      actions:
        from: Income:Rebate
    - id: rule-020
      when: narration ~ "转入" && type ~ "收入"
      actions:
        from: Income:Rebate

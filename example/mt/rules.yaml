options:
    title: mt
    operatingCurrency: CNY

templateRules:
    - id: 美团基础交易
      actions:
          date: <交易创建时间>
          narration: <订单标题>
          amount: <实付金额>.number
          type: <收/支>
          currency: CNY
          metadata:
              source: 美团
              payTime: <交易创建时间> +0800 CST
              orderId: <交易单号>
              merchantId: <商家单号>
              type: <收/支>
              method: <支付方式>

    - id: 美团支出
      when: <收/支> == "支出"
      actions:
          from:
              account: Assets:FIXME
          to:
              account: Expenses:FIXME

    - id: 美团收入
      when: <收/支> == "收入"
      actions:
          from:
              account: Income:Rebate
          to:
              account: Assets:FIXME

personalRules:
    - id: 餐饮券
      when: (<订单标题> ~ "单人餐" || <订单标题> ~ "牛肉火锅" || <订单标题> ~ "江湖菜" || <订单标题> ~ "川菜" || <订单标题> ~ "肉蟹煲" || <订单标题> ~ "自助餐" || <订单标题> ~ "盖码饭" || <订单标题> ~ "米线" || <订单标题> ~ "斑鱼" || <订单标题> ~ "蛋挞" || <订单标题> ~ "湖南菜" || <订单标题> ~ "湘语" || <订单标题> ~ "一条鱼" || <订单标题> ~ "湘菜" || <订单标题> ~ "活鱼" || <订单标题> ~ "牛羊肉" || <订单标题> ~ "米粉") && <收/支> == "支出"
      actions:
          to:
              account: Expenses:Food:Meal:Coupon

    - id: 晚餐
      when: (<订单标题> ~ "单人餐" || <订单标题> ~ "牛肉火锅" || <订单标题> ~ "江湖菜" || <订单标题> ~ "川菜" || <订单标题> ~ "肉蟹煲" || <订单标题> ~ "自助餐" || <订单标题> ~ "盖码饭" || <订单标题> ~ "米线" || <订单标题> ~ "斑鱼" || <订单标题> ~ "蛋挞" || <订单标题> ~ "湖南菜" || <订单标题> ~ "湘语" || <订单标题> ~ "一条鱼" || <订单标题> ~ "湘菜" || <订单标题> ~ "活鱼" || <订单标题> ~ "牛羊肉" || <订单标题> ~ "米粉") && raw[交易创建时间].time >= "16:00" && raw[交易创建时间].time <= "21:00" && <收/支> == "支出"
      actions:
          to:
              account: Expenses:Food:Meal:Dinner

    - id: 午餐
      when: (<订单标题> ~ "单人餐" || <订单标题> ~ "牛肉火锅" || <订单标题> ~ "江湖菜" || <订单标题> ~ "川菜" || <订单标题> ~ "肉蟹煲" || <订单标题> ~ "自助餐" || <订单标题> ~ "盖码饭" || <订单标题> ~ "米线" || <订单标题> ~ "斑鱼" || <订单标题> ~ "蛋挞" || <订单标题> ~ "湖南菜" || <订单标题> ~ "湘语" || <订单标题> ~ "一条鱼" || <订单标题> ~ "湘菜" || <订单标题> ~ "活鱼" || <订单标题> ~ "牛羊肉" || <订单标题> ~ "米粉") && raw[交易创建时间].time >= "10:30" && raw[交易创建时间].time <= "14:00" && <收/支> == "支出"
      actions:
          to:
              account: Expenses:Food:Meal:Lunch

    - id: 代金券
      when: <订单标题> ~ "代金券" && <收/支> == "支出"
      actions:
          to:
              account: Expenses:Food:Meal:Coupon

    - id: 饮品甜品
      when: (<订单标题> ~ "瑞幸" || <订单标题> ~ "喜茶" || <订单标题> ~ "分甜" || <订单标题> ~ "奶茶" || <订单标题> ~ "果茶" || <订单标题> ~ "甜品" || <订单标题> ~ "中杯" || <订单标题> ~ "大杯") && <收/支> == "支出"
      actions:
          to:
              account: Expenses:Food:Snacks

    - id: 美团月付还款
      when: <订单标题> ~ "【美团月付】主动还款" && <收/支> == "支出"
      actions:
          to:
              account: Liabilities:MT:zwyyy456

    - id: 交通0354支出
      when: <支付方式> ~ "(0354)" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:CC:BCM:0354

    - id: 交通0354收入
      when: <支付方式> ~ "(0354)" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:CC:BCM:0354

    - id: 中行1341支出
      when: <支付方式> ~ "(1341)" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:CC:BoC:1341

    - id: 中行1341收入
      when: <支付方式> ~ "(1341)" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:CC:BoC:1341

    - id: 中行1875支出
      when: <支付方式> ~ "(1875)" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:CC:BoC:1875

    - id: 中行1875收入
      when: <支付方式> ~ "(1875)" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:CC:BoC:1875

    - id: 北银2189支出
      when: <支付方式> ~ "(2189)" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:CC:BoNB:2189

    - id: 北银2189收入
      when: <支付方式> ~ "(2189)" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:CC:BoNB:2189

    - id: 招行0924支出
      when: <支付方式> ~ "(0924)" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:CC:CMB:0924

    - id: 招行0924收入
      when: <支付方式> ~ "(0924)" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:CC:CMB:0924

    - id: 民生0073支出
      when: <支付方式> ~ "(0073)" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:CC:CMBC:0073

    - id: 民生0073收入
      when: <支付方式> ~ "(0073)" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:CC:CMBC:0073

    - id: 民生5559支出
      when: <支付方式> ~ "(5559)" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:CC:CMBC:5559

    - id: 民生5559收入
      when: <支付方式> ~ "(5559)" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:CC:CMBC:5559

    - id: 中行储蓄3147支出
      when: <支付方式> ~ "(3147)" && <收/支> == "支出"
      actions:
          from:
              account: Assets:DC:BoC:3147

    - id: 中行储蓄3147收入
      when: <支付方式> ~ "(3147)" && <收/支> == "收入"
      actions:
          to:
              account: Assets:DC:BoC:3147

    - id: 美团月付支出
      when: <支付方式> ~ "美团月付" && <收/支> == "支出"
      actions:
          from:
              account: Liabilities:MT:zwyyy456

    - id: 美团月付收入
      when: <支付方式> ~ "美团月付" && <收/支> == "收入"
      actions:
          to:
              account: Liabilities:MT:zwyyy456

    - id: 美团余额支出
      when: <支付方式> ~ "美团余额" && <收/支> == "支出"
      actions:
          from:
              account: Assets:MT:Balance:zwyyy456

    - id: 美团余额收入
      when: <支付方式> ~ "美团余额" && <收/支> == "收入"
      actions:
          to:
              account: Assets:MT:Balance:zwyyy456

    - id: 忽略微信支付
      when: <支付方式> ~ "微信支付"
      actions:
          from:
              account: Assets:Test:Wx
          ignore: true

    - id: 收入返利
      when: <收/支> == "收入"
      actions:
          from:
              account: Income:Rebate

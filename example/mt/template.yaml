schema: https://deg.dev/template-profile/v2
id: mt
name: Meituan
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 19
    sourceHeaders:
        - 交易创建时间
        - 交易成功时间
        - 交易类型
        - 订单标题
        - 收/支
        - 支付方式
        - 订单金额
        - 实付金额
        - 交易单号
        - 商家单号
        - 备注
    defaultCurrency: CNY

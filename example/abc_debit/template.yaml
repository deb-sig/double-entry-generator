schema: https://deg.dev/template-profile/v1
id: abc_debit
name: abc_debit
template:
    fileFormat: csv
    delimiter: ','
    sourceHeaders:
        - 交易日期
        - 交易时间
        - 交易摘要
        - 交易金额
        - 本次余额
        - 对手信息
        - 日 志 号
        - 交易渠道
        - 交易附言
    columns:
        date: 交易日期
        time: 交易时间
        amount: 交易金额
        payee: 对手信息
        narration: 交易摘要
    metadata:
        method: 交易渠道
        txType: 交易摘要
    defaultMinusAccount: Assets:FIXME
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

options:
    title: boc
    operatingCurrency: CNY

templateRules:
    - id: 中行信用卡基础交易
      actions:
          date: <银行记账日> 20:00:00
          payee: ""
          narration: <交易描述>
          currency: <币种>

    - id: 中行信用卡收入
      when: <存入> != ""
      actions:
          amount: <存入>.number
          type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Expenses:FIXME

    - id: 中行信用卡支出
      when: <支出> != ""
      actions:
          amount: <支出>.number
          type: 支出
          from:
              account: Assets:FIXME
          to:
              account: Expenses:FIXME

personalRules:
    - id: 公共交通支出
      when: <交易描述> ~ "公共交通" && <支出> != ""
      actions:
          to:
              account: Expenses:Transport:Subway

    - id: 公共交通收入
      when: <交易描述> ~ "公共交通" && <存入> != ""
      actions:
          from:
              account: Expenses:Transport:Subway

    - id: 游戏支出
      when: (<交易描述> ~ "xbox" || <交易描述> ~ "steam" || <交易描述> ~ "游戏") && <支出> != ""
      actions:
          to:
              account: Expenses:Relax:Game

    - id: 游戏收入
      when: (<交易描述> ~ "xbox" || <交易描述> ~ "steam" || <交易描述> ~ "游戏") && <存入> != ""
      actions:
          from:
              account: Expenses:Relax:Game

    - id: 培训支出
      when: <交易描述> ~ "顾问有限公司" && <支出> != ""
      actions:
          to:
              account: Expenses:Education:Training

    - id: 培训收入

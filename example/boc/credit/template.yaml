schema: https://deg.dev/template-profile/v1
id: boc-credit
name: boc-credit
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 1
    sourceHeaders:
        - 交易日
        - 银行记账日
        - 卡号后四位
        - 交易描述
        - 存入
        - 支出
        - 币种
    columns:
        date: 交易日
        amountIn: 存入
        amountOut: 支出
        payee: 交易描述
        narration: 交易描述
        currency: 币种
    defaultMinusAccount: Assets:FIXME
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

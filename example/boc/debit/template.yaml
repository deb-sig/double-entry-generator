schema: https://deg.dev/template-profile/v2
id: boc-debit
name: BOC Debit
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 1
    sourceHeaders:
        - 记账日期
        - 记账时间
        - 币别
        - 金额
        - 余额
        - 交易名称
        - 渠道
        - 网点名称
        - 附言
        - 对方账户名
        - 对方卡号/账号
        - 对方开户行
        - 借记卡号
    defaultCurrency: CNY

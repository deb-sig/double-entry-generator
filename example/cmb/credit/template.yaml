schema: https://deg.dev/template-profile/v1
id: cmb-credit
name: cmb-credit
template:
    fileFormat: csv
    delimiter: ','
    skipLeadingRows: 1
    sourceHeaders:
        - 交易日
        - 记账日
        - 交易摘要
        - 人民币金额
        - 卡号末四位
        - 交易地金额
    columns:
        date: 记账日
        amount: 人民币金额
        payee: 交易摘要
        narration: 交易摘要
    metadata:
        txType: 交易摘要
    defaultMinusAccount: Assets:FIXME
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

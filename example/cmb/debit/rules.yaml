options:
    title: 测试
    operatingCurrency: CNY

templateRules:
    - id: 招商借记卡基础交易
      actions:
          date: <记账日期>
          amount: <交易金额>.number
          payee: <对手信息>
          narration: <客户摘要>
          currency: <货币>

    - id: 招商借记卡收入
      when: <交易金额> >= 0
      actions:
          type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Assets:DebitCard:CMB<货币>.extract("^$")

    - id: 招商借记卡支出
      when: <交易金额> < 0
      actions:
          type: 支出
          from:
              account: Assets:DebitCard:CMB<货币>.extract("^$")
          to:
              account: Expenses:FIXME

personalRules:
    - id: 电费支出
      when: (<对手信息> ~ "电费" || <对手信息> ~ "网上国网" || <对手信息> ~ "国网") && <交易金额> < 0
      actions:
          to:
              account: Expenses:Electricity

    - id: 电费收入
      when: (<对手信息> ~ "电费" || <对手信息> ~ "网上国网" || <对手信息> ~ "国网") && <交易金额> >= 0
      actions:
          from:
              account: Expenses:Electricity

    - id: 中国移动支出
      when: <对手信息> ~ "中国移动" && <交易金额> < 0
      actions:
          to:
              account: Expenses:Mobile

    - id: 中国移动收入
      when: <对手信息> ~ "中国移动" && <交易金额> >= 0
      actions:
          from:
              account: Expenses:Mobile

    - id: 保险赔付收入
      when: <对手信息> ~ "太平洋健康保险股份有限公司" && <客户摘要> ~ "汇入汇款" && <交易金额> >= 0
      actions:
          from:
              account: Income:Insurance

    - id: 保险赔付支出
      when: <对手信息> ~ "太平洋健康保险股份有限公司" && <客户摘要> ~ "汇入汇款" && <交易金额> < 0
      actions:
          to:
              account: Income:Insurance

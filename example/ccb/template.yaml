schema: https://deg.dev/template-profile/v1
id: ccb
name: ccb
template:
    fileFormat: xls
    delimiter: ','
    skipLeadingRows: 5
    sourceHeaders:
        - 记账日
        - 交易日期
        - 交易时间
        - 支出
        - 收入
        - 账户余额
        - 币种
        - 摘要
        - 对方账号
        - 对方户名
        - 交易地点
    columns:
        date: 交易日期
        time: 交易时间
        amountIn: 收入
        amountOut: 支出
        payee: 对方户名
        narration: 摘要
        currency: 币种
    metadata:
        method: 交易地点
        txType: 摘要
    defaultMinusAccount: Assets:Bank:CN:CCB:Checking
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

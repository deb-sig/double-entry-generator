schema: https://deg.dev/template-profile/v2
id: ccb
name: ccb
template:
    fileFormat: xls
    delimiter: ','
    skipLeadingRows: 6
    skipInvalidRows: true
    sourceHeaders:
        - 记账日
        - 交易日期
        - 交易时间
        - 支出
        - 收入
        - 账户余额
        - 币种
        - 摘要
        - 对方账号
        - 对方户名
        - 交易地点
    defaultCurrency: CNY

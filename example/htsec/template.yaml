schema: https://deg.dev/template-profile/v1
id: htsec
name: htsec
template:
    fileFormat: xlsx
    delimiter: ','
    sourceHeaders:
        - 证券代码
        - 证券名称
        - 成交日期
        - 成交时间
        - 成交数量
        - 成交价格
        - 成交金额
        - 发生金额
        - 操作
        - 合同号
        - 成交号
        - 手续费
        - 印花税
        - 过户费
        - 其他费
        - 资金本次余额
        - 股份本次余额
        - 股东账号
        - 资金账号
    columns:
        date: 成交日期
        time: 成交时间
        amount: 发生金额
        type: 操作
    metadata:
        txType: 操作
    defaultMinusAccount: Assets:FIXME
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

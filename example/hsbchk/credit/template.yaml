schema: https://deg.dev/template-profile/v1
id: hsbchk-credit
name: hsbchk-credit
template:
    fileFormat: csv
    delimiter: ','
    stripTabs: true
    sourceHeaders:
        - Transaction date
        - Post date
        - Description
        - Billing amount
        - Billing currency
        - Transaction status
        - Merchant name
        - Country / region
        - Area / district
        - Credit / Debit
    columns:
        date: Transaction date
        amount: Billing amount
        payee: Merchant name
        narration: Description
        type: Credit / Debit
        currency: Billing currency
    metadata:
        status: Transaction status
    defaultMinusAccount: Assets:FIXME
    defaultPlusAccount: Expenses:FIXME
    defaultCurrency: CNY

schema: https://deg.dev/template-profile/v2
id: hsbchk-credit
name: HSBC HK Credit
template:
    fileFormat: csv
    delimiter: ','
    stripTabs: true
    dateFormat: 02/01/2006
    sourceHeaders:
        - Transaction date
        - Post date
        - Description
        - Billing amount
        - Billing currency
        - Transaction status
        - Merchant name
        - Country / region
        - Area / district
        - Credit / Debit
    defaultCurrency: CNY

options:
    title: HSBC HK信用卡示例
    operatingCurrency: CNY

templateRules:
    - id: 汇丰香港信用卡基础交易
      actions:
          date: <Transaction date>
          amount: <Billing amount>.number
          currency: <Billing currency>
          payee: <Merchant name>
          narration: <Description>
          metadata:
              source: HSBC HK
              post_date: <Post date>
              country: <Country / region>
              credit_or_debit: <Credit / Debit>
              status: <Transaction status>

    - id: 汇丰香港信用卡支出
      when: <Credit / Debit> == DEBIT
      actions:
          type: 支出
          from:
              account: Liabilities:CreditCard:HSBC
          to:
              account: Expenses:FIXME

    - id: 汇丰香港信用卡收入
      when: <Credit / Debit> == CREDIT
      actions:
          type: 收入
          from:
              account: Assets:FIXME
          to:
              account: Liabilities:CreditCard:HSBC

personalRules:
    - id: 美团支出
      when: <Merchant name> ~ "MEITUAN" && <Description> ~ "APPLEPAY MEITUAN" && <Credit / Debit> == DEBIT
      actions:
          to:
              account: Expenses:Food:Delivery

    - id: 美团收入
      when: <Merchant name> ~ "MEITUAN" && <Description> ~ "APPLEPAY MEITUAN" && <Credit / Debit> == CREDIT
      actions:
          from:
              account: Expenses:Food:Delivery

    - id: 还款
      when: <Description> ~ "PAYMENT - THANK YOU"
      actions:
          from:
              account: Assets:Bank:HK:HSBC:Savings

    - id: 快餐支出
      when: (<Merchant name> ~ "KFC RESTAURANT" || <Merchant name> ~ "MCDONALDS") && <Credit / Debit> == DEBIT
      actions:
          to:
              account: Expenses:Food:FastFood

    - id: 快餐收入
      when: (<Merchant name> ~ "KFC RESTAURANT" || <Merchant name> ~ "MCDONALDS") && <Credit / Debit> == CREDIT
      actions:
          from:
              account: Expenses:Food:FastFood

    - id: 便利店支出
      when: <Merchant name> ~ "7-ELEVEN" && <Credit / Debit> == DEBIT
      actions:
          to:
              account: Expenses:Groceries

    - id: 便利店收入
      when: <Merchant name> ~ "7-ELEVEN" && <Credit / Debit> == CREDIT
      actions:
          from:
              account: Expenses:Groceries

    - id: 地铁支出
      when: <Merchant name> ~ "METRO" && <Credit / Debit> == DEBIT
      actions:
          to:
              account: Expenses:Transport

    - id: 地铁收入
      when: <Merchant name> ~ "METRO" && <Credit / Debit> == CREDIT
      actions:
          from:
              account: Expenses:Transport

    - id: 退款
      when: <Description> ~ "RETURN"
      actions:
          from:
              account: Assets:Refund

    - id: 银联商户支出
      when: <Merchant name> ~ "UNIONPAY MERCHANT" && <Credit / Debit> == DEBIT
      actions:
          to:
              account: Expenses:Shopping

    - id: 银联商户收入
      when: <Merchant name> ~ "UNIONPAY MERCHANT" && <Credit / Debit> == CREDIT
      actions:
          from:
              account: Expenses:Shopping
